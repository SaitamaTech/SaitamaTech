name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:

  github-metrics:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: lowlighter/metrics@latest
        with:

          token: ${{ secrets.GITHUB_TOKEN }}

          user: SaitamaTech

          template: classic

          base: header, activity, repositories, metadata

          plugin_languages: yes

          plugin_languages_limit: 8

          plugin_isocalendar: yes

          plugin_followup: yes

          plugin_stars: yes

          plugin_topics: yes

          plugin_repositories: yes

          plugin_habits: yes

          plugin_lines: yes

          plugin_people: yes

          plugin_introduction: yes
